[ids]
# 全キーボードを対象にし、外付けキーボードのみ除外
*
# IX Keyboard (外付けキーボード) を除外
-1d50:615e

[global]
layer_indicator = 1

[main]
# --- Toggle Switch ---
# Toggle between standard QWERTY and Custom Layout
f12 = toggle(oonishi_mode)
f9 = toggle(cloud_mode)

[oonishi_mode]
# --- Toggle Switch (Exit) ---
f12 = toggle(oonishi_mode)

# --- Tap-Hold (One-Shot Layer) Setup ---
# Space: Tap=Backspace, Hold=layer1
space = overload(layer1, backspace)

# Henkan / Hangeul / Hangul (Right of Space)
# Tap=Space, Hold=layer2
hangeul = overload(layer2, space)
hangul = overload(layer2, space)
henkan = overload(layer2, space)

# F14: Tap=Space, Hold=layer2 (Backup)
f14 = overload(layer2, space)

# --- Other Special Keys ---
# Muhenkan / Hanja (Left of Space)
# Tap=Enter
hanja = enter
muhenkan = enter

f13 = enter

# --- Base Layout Remap (Onishi-based) ---
w = l
e = u
r = f
t = comma
i = w
o = r
p = y

q = q
a = e
s = i
d = a
f = o
g = minus
h = h
j = k
k = t
l = n
# SC027 (JIS Semicolon) -> s
semicolon = s
# SC028 (JIS Colon) -> h
apostrophe = h

# User requested P at ']' position.
# On JIS, 'rightbrace' is usually '[' and 'backslash' is ']'.
# Trying explicit mapping for both potential candidates.
rightbrace = p
backslash = p

z = z
x = x
c = c
v = v
# SC073 (JIS Ro) -> b
# Fix: 'b' input becoming '\' means 'intl_ro' was likely wrong.
# Adding 'ro' and '102nd' to capture the Ro key correctly.
b = b
n = n
m = g
u = .
capslock = q
comma = d
dot = m
slash = j

intl_ro = b
ro = b
102nd = b

[layer1]
# Activated by holding Space
w = 1
e = 2
r = 3
t = dot
# i -> < (Shift + Comma)
i = S-comma
# o -> = (Shift + Minus)
o = S-minus
# p -> > (Shift + Period)
p = S-dot

# q -> ~ (JIS Tilde is Shift + ^/Equal)
q = S-equal
a = 0
s = 4
d = 5
f = 6
g = tab
# j -> ^ (JIS Caret is on 'equal' key)
j = equal
# k -> + (JIS Plus is Shift + Semicolon)
k = S-semicolon
l = minus

# SC027 -> * (JIS Asterisk is Shift + Colon)
semicolon = S-apostrophe
# SC028 -> /
apostrophe = slash

# ] -> % (JIS Percent is Shift + 5)
rightbrace = S-5
backslash = S-5

# z -> $ (JIS Dollar is Shift + 4)
z = S-4
x = 7
c = 8
v = 9
# m -> _ (JIS Underscore is Shift + Ro)
# Fix: Use S-ro as intl_ro might be invalid/unrecognized
m = S-ro
comma = S-1
dot = S-slash
# / -> : (JIS Colon key is 'apostrophe')
slash = apostrophe
# SC073 -> ; (JIS Semicolon key)
intl_ro = semicolon
ro = semicolon
102nd = semicolon


[layer2]
# Activated by holding Hangeul (Henkan/Right) or F14
# w -> [ (JIS Bracket Left is on 'rightbrace' key)
w = rightbrace
# e -> " (JIS Double Quote is Shift + 2)
e = S-2
# r -> ] (JIS Bracket Right is on 'backslash' key usually)
r = backslash
# t -> | (JIS Pipe is Shift + Yen, 'intl_yen')
# Fix: Use S-yen
t = S-yen

i = esc
o = up
p = capslock

# q -> @ (JIS At is on 'leftbrace' key)
q = leftbrace
# a -> # (JIS Hash is Shift + 3)
a = S-3
# s -> (
s = S-8
# d -> ' (JIS Single Quote is Shift + 7)
d = S-7
# f -> )
f = S-9

# g -> & (JIS Ampersand is Shift + 6)
g = S-6
j = volumeup
k = left
l = down

# SC027 -> Right
semicolon = right
apostrophe = `

# ] -> PrintScreen
rightbrace = sysrq
backslash = sysrq

# z -> SC073 (Ro)
z = intl_ro
# x -> { (Shift + [)
x = S-rightbrace
# c -> ` (Backtick, JIS is Shift + @)
c = S-leftbrace
# v -> } (Shift + ])
v = S-backslash

m = volumedown
comma = previoussong
dot = playpause
slash = nextsong
# SC073 -> Delete
intl_ro = delete
ro = delete
102nd = delete

[cloud_mode]
# --- Toggle Switch (Exit) ---
f9 = toggle(cloud_mode)

# --- All other keys -> F24 ---
# Alphabet
a = f24
b = f24
c = f24
d = f24
e = f24
f = f24
g = f24
h = f24
i = f24
j = f24
k = f24
l = f24
m = f24
n = f24
o = f24
p = f24
q = f24
r = f24
s = f24
t = f24
u = f24
v = f24
w = f24
x = f24
y = f24
z = f24

# Numbers
1 = f24
2 = f24
3 = f24
4 = f24
5 = f24
6 = f24
7 = f24
8 = f24
9 = f24
0 = f24

# Symbol keys
minus = f24
equal = f24
leftbrace = f24
rightbrace = f24
backslash = f24
semicolon = f24
apostrophe = f24
grave = f24
comma = f24
dot = f24
slash = f24
